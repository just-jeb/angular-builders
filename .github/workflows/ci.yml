name: ci

on:
  push:
    branches: [master]
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type (recover = re-publish packages missing from the registry)'
        required: true
        default: 'beta'
        type: choice
        options: [beta, graduate, recover]

# Cancel superseded in-progress runs (rapid pushes / PR re-pushes) as usual, EXCEPT the
# `ci(release): publish` commit that a beta/graduate publish pushes to master mid-job. That
# push would otherwise spawn a same-group run that cancels the still-running publish — and
# since lerna pushes git tags BEFORE the per-package npm publish loop, the kill can land
# mid-loop (tags pushed, packages not; this is how the v22 beta published only 2 of 6).
# Excluding ci(release) commits (same guard as the build job's skip) keeps normal
# cancellation while letting an in-flight publish run to completion.
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ !contains(github.event.head_commit.message, 'ci(release)') }}

# Karma uses the runner's preinstalled system Chrome (see karma.conf.js), so Puppeteer's
# bundled Chrome is unused. Skip its download to avoid install-time failures when the
# Chrome version is unavailable from Puppeteer's CDN or the cached binary is incomplete.
env:
  PUPPETEER_SKIP_DOWNLOAD: 'true'

jobs:
  build:
    if: github.event_name == 'workflow_dispatch' || (!contains(github.event.head_commit.message, 'ci(release)'))
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
      has_tests: ${{ steps.discover.outputs.has_tests }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - run: git fetch origin master:master || true
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
      - run: corepack enable
      - uses: actions/cache@v5
        id: deps-cache
        with:
          path: |
            node_modules
            .yarn
          key: deps-${{ runner.os }}-node${{ hashFiles('.nvmrc') }}-${{ hashFiles('yarn.lock') }}
          restore-keys: deps-${{ runner.os }}-node${{ hashFiles('.nvmrc') }}-
      - uses: actions/cache@v5
        if: steps.deps-cache.outputs.cache-hit != 'true'
        with:
          # Scope to corepack's download dir only (~/.cache/node holds the Yarn release).
          # The broad ~/.cache also contains ~/.cache/Cypress, which has its own version-keyed
          # cache (below) restored by the integration jobs; caching it here too would duplicate
          # the ~200MB binary that no job restores from this cache, wasting the repo's Actions
          # cache budget and risking eviction of the dedicated cypress cache. (A `!~/.cache/Cypress`
          # exclude does NOT work — actions/cache doesn't resolve ~ in negative patterns — so
          # narrow with a positive path instead.)
          path: ~/.cache/node
          key: yarn-dl-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: yarn-dl-${{ runner.os }}-
      # The Cypress binary (~/.cache/Cypress/<version>) is cached separately from node_modules,
      # NOT folded into the deps cache. Reason: the deps cache uses actions/cache (save-on-miss)
      # keyed by yarn.lock; once it holds a binary, an exact key hit never re-saves, so a stale
      # binary "snowballs" — a Cypress version bump can't replace it and integration jobs fail
      # with "the Cypress binary is missing" for the new version. (This is how #2293's bump
      # broke master.) Keying this cache by yarn.lock means a bump forces a fresh save; the
      # `cypress install` step below downloads the resolved version into it. restore-keys lets
      # an unrelated lockfile change reuse the previous binary so install no-ops.
      - uses: actions/cache@v5
        with:
          path: ~/.cache/Cypress
          key: cypress-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: cypress-${{ runner.os }}-
      - run: yarn --immutable
      # Populate the Cypress cache above with the resolved version's binary (idempotent — a
      # no-op if already present). yarn's own postinstall skips this when build-state is
      # restored from cache, so do it explicitly. Invoke the hoisted binary directly: in Yarn
      # Berry `yarn cypress` resolves to a script name, and Cypress is a workspace (example)
      # dependency, not a root one.
      - run: node_modules/.bin/cypress install
      # On PRs, build only affected packages unless 'ci:full' label is present.
      # On master events (push/workflow_dispatch), build all packages. (see #2026)
      - run: |
          if [ "${{ github.event_name }}" == "pull_request" ] && [ "${{ contains(github.event.pull_request.labels.*.name, 'ci:full') }}" != "true" ]; then
            yarn build:packages
          else
            yarn build:packages:all
          fi
      - id: discover
        run: |
          MATRIX=$(node scripts/discover-tests.js)
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
          TEST_COUNT=$(echo "$MATRIX" | jq '.include | length')
          if [ "$TEST_COUNT" -gt 0 ]; then
            echo "has_tests=true" >> $GITHUB_OUTPUT
          else
            echo "has_tests=false" >> $GITHUB_OUTPUT
          fi
          echo "Test count: $TEST_COUNT"
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: packages/*/dist

  # Repo-wide formatting gate. Prettier is enforced at commit time by lint-staged, but that
  # only touches staged files, so the tree drifts after a prettier/config change. This job
  # runs `prettier --check` over the whole repo (same globs as the `format`/`format:check`
  # root scripts and lint-staged) and fails on any drift. Kept as its own lightweight job
  # (no build, no Cypress) so it runs in parallel with build/integration; it is wired into
  # `ci-pass` below so branch protection enforces it.
  format:
    if: github.event_name == 'workflow_dispatch' || (!contains(github.event.head_commit.message, 'ci(release)'))
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
      - run: corepack enable
      - uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            .yarn
          key: deps-${{ runner.os }}-node${{ hashFiles('.nvmrc') }}-${{ hashFiles('yarn.lock') }}
          restore-keys: deps-${{ runner.os }}-node${{ hashFiles('.nvmrc') }}-
      - run: yarn --immutable
      - run: yarn format:check

  integration:
    needs: build
    if: needs.build.outputs.has_tests == 'true'
    name: ${{ matrix.name }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.build.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
      - run: corepack enable
      - uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            .yarn
          key: deps-${{ runner.os }}-node${{ hashFiles('.nvmrc') }}-${{ hashFiles('yarn.lock') }}
          fail-on-cache-miss: true
      # Restore the Cypress binary saved by the build job (same key). e2e tests (yarn e2e)
      # launch Cypress, which needs its binary present in ~/.cache/Cypress.
      - uses: actions/cache/restore@v5
        with:
          path: ~/.cache/Cypress
          key: cypress-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: cypress-${{ runner.os }}-
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: packages
      - run: sudo apt-get update && sudo apt-get install -y xvfb
      - name: ${{ matrix.purpose }}
        run: |
          Xvfb :99 &
          export DISPLAY=:99
          cd ${{ matrix.app }}
          ${{ matrix.command }}

  ci-pass:
    needs: [build, format, integration]
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1

  publish:
    needs: [build, integration]
    if: github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          token: ${{ secrets.GH_PERSONAL_TOKEN }}
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://registry.npmjs.org'
      - run: corepack enable
      - uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            .yarn
          key: deps-${{ runner.os }}-node${{ hashFiles('.nvmrc') }}-${{ hashFiles('yarn.lock') }}
          fail-on-cache-miss: true
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: packages
      - name: Publish
        run: |
          git config --global user.name ${{ secrets.GIT_USER }}
          git config --global user.email ${{ secrets.GIT_EMAIL }}
          if [ "${{ github.event.inputs.release_type }}" == "graduate" ]; then
            yarn graduate --yes
          elif [ "${{ github.event.inputs.release_type }}" == "recover" ]; then
            # Recover a partial publish: publish only packages whose current version
            # (from package.json) isn't on the registry yet. No version bump, no new tags.
            yarn lerna publish from-package --dist-tag=next --yes
          else
            bash scripts/default-registry.sh
          fi
